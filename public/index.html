<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>☕ yt-mp3</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-1:#8B6B47;--bg-2:#A67C52;
      --text:#3d2817;--muted:#C9A87C;
      --cream:#FFE4C4;--accent:#C87941;--accent-dk:#8B4513;
      --coffee:#D4A574;--glass:rgba(255,255,255,0.13);
      --border:rgba(255,255,255,0.2);
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 50%,var(--bg-1) 100%);
      color:var(--text);min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%,rgba(139,107,71,.22) 0%,transparent 50%),
        radial-gradient(circle at 80% 70%,rgba(166,124,82,.18) 0%,transparent 50%);
    }

    /* nav */
    nav{
      position:fixed;top:0;left:0;right:0;height:58px;z-index:50;
      background:rgba(61,40,23,.78);backdrop-filter:blur(12px);
      display:flex;align-items:center;padding:0 26px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .logo{font-size:1.1rem;font-weight:700;color:var(--coffee)}

    /* layout */
    main{max-width:660px;margin:0 auto;padding:90px 20px 70px;position:relative;z-index:1}

    /* hero */
    .hero{text-align:center;margin-bottom:28px}
    .hero-icon{font-size:2.8rem;margin-bottom:10px}
    .hero h1{font-size:2rem;color:var(--cream);text-shadow:2px 2px 4px rgba(61,40,23,.3);margin-bottom:5px}
    .hero p{color:var(--muted);font-size:.92rem}

    /* card */
    .card{
      background:var(--glass);border:1px solid var(--border);
      border-radius:18px;padding:26px;
      box-shadow:0 8px 32px rgba(0,0,0,.22);
      backdrop-filter:blur(6px);
    }

    /* input row */
    .row{display:flex;gap:10px;margin-bottom:16px}
    .url-input{
      flex:1;padding:12px 15px;border-radius:11px;
      border:1.5px solid rgba(255,255,255,.26);
      background:rgba(255,255,255,.2);
      font-size:.93rem;color:var(--text);outline:none;
      transition:border .18s;
    }
    .url-input::placeholder{color:rgba(61,40,23,.42)}
    .url-input:focus{border-color:var(--coffee)}
    .btn{
      background:linear-gradient(135deg,var(--accent),var(--accent-dk));
      color:#fff;border:none;padding:12px 18px;border-radius:11px;
      font-weight:700;cursor:pointer;white-space:nowrap;font-size:.93rem;
      transition:opacity .18s,transform .1s;
    }
    .btn:hover{opacity:.88}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.46;cursor:not-allowed;transform:none}

    /* info panel */
    #infoPanel{
      display:none;align-items:flex-start;gap:14px;
      background:rgba(61,40,23,.18);border:1px solid rgba(255,255,255,.1);
      border-radius:12px;padding:14px;margin-bottom:14px;
    }
    #infoPanel.show{display:flex}
    .thumb{width:96px;height:60px;object-fit:cover;border-radius:7px;flex-shrink:0;background:#5a3e28}
    .info-title{font-weight:700;color:var(--cream);font-size:.92rem;margin-bottom:3px;line-height:1.35}
    .info-meta{color:var(--muted);font-size:.8rem}

    /* download btn */
    #downloadRow{display:none}
    #downloadRow.show{display:block}
    #dlBtn{
      width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dk) 100%);
      color:#fff;font-size:.97rem;font-weight:800;
      display:flex;align-items:center;justify-content:center;gap:9px;
      box-shadow:0 4px 14px rgba(0,0,0,.22);transition:opacity .18s,transform .1s;
    }
    #dlBtn:hover{opacity:.88}
    #dlBtn:active{transform:scale(.98)}
    #dlBtn:disabled{opacity:.46;cursor:not-allowed;transform:none}

    /* progress */
    #progress{display:none;margin-top:12px}
    #progress.show{display:block}
    .bar-track{height:5px;background:rgba(255,255,255,.14);border-radius:99px;overflow:hidden}
    .bar-fill{
      height:100%;background:linear-gradient(90deg,var(--accent),var(--coffee));
      border-radius:99px;width:0%;transition:width .3s ease;
    }

    /* status */
    #status{
      display:none;margin-top:12px;padding:11px;border-radius:9px;
      font-weight:600;font-size:.88rem;text-align:center;
    }
    #status.show{display:block}
    #status.info{background:rgba(200,121,65,.18);color:var(--cream)}
    #status.ok  {background:rgba(50,150,50,.2);color:#c1f0c1;border:1px solid rgba(80,180,80,.3)}
    #status.err {background:rgba(190,40,40,.22);color:#ffc5c5;border:1px solid rgba(220,80,80,.3)}

    /* steps */
    .steps{margin-top:24px}
    .steps h3{
      color:var(--coffee);font-size:.8rem;font-weight:700;
      text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;
    }
    .step{
      display:flex;align-items:center;gap:11px;
      background:rgba(255,255,255,.06);border-radius:9px;
      padding:9px 13px;color:#EBD9C0;font-size:.86rem;margin-bottom:7px;
    }
    .step-n{
      width:22px;height:22px;border-radius:50%;flex-shrink:0;
      background:rgba(200,121,65,.38);color:var(--cream);
      font-weight:700;font-size:.75rem;display:flex;align-items:center;justify-content:center;
    }

    footer{text-align:center;padding:30px 10px 8px;color:rgba(61,40,23,.55);font-size:.82rem;font-weight:600}

    @media(max-width:500px){
      .hero h1{font-size:1.6rem}
      .row{flex-direction:column}
      .btn{width:100%}
      #infoPanel.show{flex-direction:column}
      .thumb{width:100%;height:auto;max-height:140px}
    }
  </style>
</head>
<body>
<nav><span class="logo">☕ yt-mp3</span></nav>

<main>
  <div class="hero">
    <div class="hero-icon">🎵</div>
    <h1>YouTube → MP3</h1>
    <p>Paste a YouTube URL and download the audio as an MP3.</p>
  </div>

  <div class="card">
    <div class="row">
      <input id="urlInput" class="url-input" type="text"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off" spellcheck="false" />
      <button id="fetchBtn" class="btn" onclick="fetchInfo()">Get Info</button>
    </div>

    <div id="infoPanel">
      <img id="thumb" class="thumb" src="" alt="thumbnail" />
      <div>
        <div id="infoTitle" class="info-title"></div>
        <div id="infoMeta"  class="info-meta"></div>
      </div>
    </div>

    <div id="downloadRow">
      <button id="dlBtn" onclick="startDownload()">
        <span>⬇️</span><span id="dlTxt">Download MP3</span>
      </button>
    </div>

    <div id="progress"><div class="bar-track"><div id="bar" class="bar-fill"></div></div></div>
    <div id="status"></div>
  </div>

  <div class="steps">
    <h3>How it works</h3>
    <div class="step"><div class="step-n">1</div><span>Paste any YouTube video URL above</span></div>
    <div class="step"><div class="step-n">2</div><span>Click <strong>Get Info</strong> to preview the video</span></div>
    <div class="step"><div class="step-n">3</div><span>Click <strong>Download MP3</strong> — file saves to your Downloads</span></div>
  </div>

  <footer>Powered by yt-dlp &amp; ffmpeg</footer>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentUrl   = '';
  let currentTitle = '';

  // ── UI helpers ─────────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);

  function setStatus(msg, type) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'show ' + type;
  }
  function clearStatus() { $('status').className = ''; }

  function setProgress(pct) { $('bar').style.width = pct + '%'; }

  function showProgress(on) {
    $('progress').className = on ? 'show' : '';
    if (!on) setProgress(0);
  }

  // ── Fetch video info ───────────────────────────────────────────────────────
  async function fetchInfo() {
    const url = $('urlInput').value.trim();
    if (!url) { setStatus('Please enter a YouTube URL.', 'err'); return; }

    const btn = $('fetchBtn');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    clearStatus();
    $('infoPanel').classList.remove('show');
    $('downloadRow').classList.remove('show');

    try {
      const res  = await fetch('/info?url=' + encodeURIComponent(url));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Could not fetch video info.');

      currentUrl   = url;
      currentTitle = data.title || '';

      $('thumb').src      = data.thumbnail || '';
      $('infoTitle').textContent = data.title || 'Unknown title';
      $('infoMeta').textContent  = [data.duration_string, data.uploader ? 'by ' + data.uploader : '']
                                    .filter(Boolean).join(' · ');

      $('infoPanel').classList.add('show');
      $('downloadRow').classList.add('show');
      $('dlTxt').textContent = 'Download MP3';
    } catch (e) {
      setStatus('❌ ' + e.message, 'err');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Get Info';
    }
  }

  // ── Download MP3 ───────────────────────────────────────────────────────────
  async function startDownload() {
    if (!currentUrl) return;

    const btn = $('dlBtn');
    btn.disabled = true;
    $('dlTxt').textContent = 'Converting…';
    showProgress(true);
    setProgress(8);
    setStatus('⏳ Downloading and converting… this may take a moment.', 'info');

    // Animated fake-progress while server works
    let pct = 8;
    const ticker = setInterval(() => {
      pct = Math.min(pct + Math.random() * 7, 88);
      setProgress(pct);
    }, 900);

    try {
      const params = new URLSearchParams({ url: currentUrl, title: currentTitle });
      const res = await fetch('/download?' + params.toString());

      // Always clear the interval once we have a response
      clearInterval(ticker);

      if (!res.ok) {
        let errMsg = 'Download failed.';
        try { const d = await res.json(); errMsg = d.error || errMsg; } catch {}
        throw new Error(errMsg);
      }

      setProgress(100);

      // Save the blob — browser triggers "Save as" dialog
      const blob = await res.blob();
      const cd   = res.headers.get('Content-Disposition') || '';
      const fnMatch = cd.match(/filename="([^"]+)"/);
      const filename = fnMatch ? fnMatch[1] : 'audio.mp3';

      const link = Object.assign(document.createElement('a'), {
        href:     URL.createObjectURL(blob),
        download: filename,
      });
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);

      setStatus('✅ Done! Check your Downloads folder.', 'ok');
      $('dlTxt').textContent = 'Download MP3 Again';
    } catch (e) {
      clearInterval(ticker); // safety — if fetch itself threw before we cleared
      setStatus('❌ ' + e.message, 'err');
      $('dlTxt').textContent = 'Download MP3';
    } finally {
      btn.disabled = false;
      setTimeout(() => showProgress(false), 1800);
    }
  }

  // Allow Enter key in input
  $('urlInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>
</body>
</html>
